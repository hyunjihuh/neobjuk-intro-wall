<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our First Page · KAIST × UITS</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
</head>
<body>

<div class="topbar">
  <h1>📸 Our First Page <span class="x">·</span> KAIST × UITS</h1>
  <div class="topbar-right">
    <span id="count" class="count"></span>
    <button class="tab active" data-batch="1">Batch 1</button>
    <button class="tab" data-batch="2">Batch 2</button>
  </div>
</div>

<div class="guide">
  <div class="guide-box">
    <strong>How it works:</strong> Join your team, fill in your intro & photo, and pick your team leader for a 👑!
  </div>
</div>

<div class="canvas">
  <div class="canvas-inner" id="wall"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Photo Editor (fullscreen) -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-top">
    <button class="ebtn cancel" id="editorCancel">Cancel</button>
    <button class="ebtn done" id="editorDone">Done</button>
  </div>
  <div class="editor-canvas-wrap" id="editorBox">
    <img class="editor-bg" id="editorImg" />
    <canvas class="draw-layer" id="drawCanvas"></canvas>
  </div>
  <div class="editor-controls">
    <span>Zoom</span>
    <input type="range" id="editorZoom" min="100" max="300" value="100" />
  </div>
  <div class="editor-tools">
    <button class="tool-btn active" id="tool-move">Move</button>
    <button class="tool-btn" id="tool-sticker">Stickers</button>
    <button class="tool-btn" id="tool-brush">Brush</button>
  </div>
  <div id="toolPanel-sticker" style="display:none">
    <div class="sticker-tray" id="editorStickerTray"></div>
  </div>
  <div id="toolPanel-brush" style="display:none">
    <div class="brush-colors" id="brushColors"></div>
    <div class="brush-sizes">
      <span>Size</span>
      <input type="range" id="brushSize" min="2" max="20" value="4" />
    </div>
  </div>
</div>

<!-- Calibration -->
<div class="cal-panel" id="calPanel">
  <h3>Cell Calibration</h3>
  <div class="sl"><label>left <span id="v-left">24.2%</span></label>
    <input type="range" id="r-left" min="0" max="50" step="0.1" value="24.2"></div>
  <div class="sl"><label>width <span id="v-width">51.1%</span></label>
    <input type="range" id="r-width" min="20" max="100" step="0.1" value="51.1"></div>
  <div class="sl"><label>height <span id="v-height">18%</span></label>
    <input type="range" id="r-height" min="10" max="30" step="0.1" value="18"></div>
  <hr style="margin:10px 0;border:none;border-top:1px solid #eee">
  <div class="sl"><label>c1 top <span id="v-c1">5%</span></label>
    <input type="range" id="r-c1" min="0" max="30" step="0.1" value="5"></div>
  <div class="sl"><label>c2 top <span id="v-c2">25.1%</span></label>
    <input type="range" id="r-c2" min="10" max="50" step="0.1" value="25.1"></div>
  <div class="sl"><label>c3 top <span id="v-c3">45%</span></label>
    <input type="range" id="r-c3" min="30" max="70" step="0.1" value="45"></div>
  <div class="sl"><label>c4 top <span id="v-c4">64.6%</span></label>
    <input type="range" id="r-c4" min="50" max="90" step="0.1" value="64.6"></div>
  <button class="copy-btn" id="copyCSS">Copy CSS values</button>
  <div class="css-out" id="cssOut"></div>
</div>

<!-- Modals -->
<div id="overlay" class="overlay">
  <!-- Add Member -->
  <div class="sheet" id="sheet-member">
    <h2>Add yourself</h2>
    <div id="modal-context" class="context"></div>
    <div class="field">
      <label>Your name</label>
      <input id="f-name" placeholder="e.g. Rahim" />
    </div>
    <div class="field">
      <label>Nickname</label>
      <input id="f-nickname" placeholder="e.g. Rahi" />
    </div>
    <div class="field">
      <label>Introduce you!</label>
      <input id="f-intro1" placeholder="e.g. 2nd year CSE from Dhaka" />
    </div>
    <div class="field">
      <label>Tell us something fun about you!</label>
      <textarea id="f-intro" placeholder="e.g. I can eat 10 biryanis in one sitting"></textarea>
    </div>
    <div class="field">
      <label>Your best photo</label>
      <div id="filepick" class="filepick">Tap to choose a photo</div>
      <input id="f-photo" type="file" accept="image/*,.heic,.heif" style="display:none" />
      <img id="photoPreview" style="display:none;width:100%;aspect-ratio:10/7;object-fit:cover;border-radius:10px;margin-top:10px;cursor:pointer" onclick="openEditor()" title="Click to edit & decorate" />
    </div>
    <label class="check-field" id="leader-check">
      <input type="checkbox" id="f-leader" />
      <span>👑 I'm the team leader!</span>
    </label>
    <div class="actions">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button id="btn-submit-member" class="btn primary">Post</button>
    </div>
    <div id="status-member" class="status"></div>
  </div>

  <!-- Create Team -->
  <div class="sheet" id="sheet-team" style="display:none">
    <h2>Create new team</h2>
    <div class="field">
      <label>Team number</label>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;font-size:1rem;white-space:nowrap">Team</span>
        <input id="f-team" placeholder="1" autocomplete="off" type="number" min="1" style="width:60px;text-align:center" />
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button id="btn-submit-team" class="btn primary">Create</button>
    </div>
    <div id="status-team" class="status"></div>
  </div>

  <!-- Edit Member -->
  <div class="sheet" id="sheet-edit" style="display:none">
    <h2>Edit</h2>
    <div id="edit-context" class="context"></div>
    <div class="field">
      <label>Name</label>
      <input id="e-name" />
    </div>
    <div class="field">
      <label>Nickname</label>
      <input id="e-nickname" placeholder="e.g. Rahi" />
    </div>
    <div class="field">
      <label>Introduce you!</label>
      <input id="e-intro1" />
    </div>
    <div class="field">
      <label>Tell us something fun about you!</label>
      <textarea id="e-intro2"></textarea>
    </div>
    <div class="field">
      <label>Photo</label>
      <img id="editPhotoPreview" style="display:none;width:100%;aspect-ratio:10/7;object-fit:cover;border-radius:10px;cursor:pointer" onclick="openEditorForEdit()" title="Click to edit & decorate" />
      <div id="editPhotoActions" style="margin-top:8px;display:flex;gap:8px">
        <button class="btn ghost" style="flex:none;padding:8px 14px;font-size:.82rem" onclick="openEditorForEdit()">Edit photo</button>
        <button class="btn ghost" style="flex:none;padding:8px 14px;font-size:.82rem" onclick="changeEditPhoto()">Change photo</button>
      </div>
      <input id="e-photo" type="file" accept="image/*,.heic,.heif" style="display:none" />
    </div>
    <label class="check-field" id="edit-leader-check">
      <input type="checkbox" id="e-leader" />
      <span>👑 I'm the team leader!</span>
    </label>
    <div class="actions">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button id="btn-submit-edit" class="btn primary">Save</button>
    </div>
    <div id="status-edit" class="status"></div>
  </div>
</div>

<script src="editor.js"></script>
<script src="app.js"></script>
</body>
</html>
